<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aitemi 监控平台</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Password Gate -->
    <div id="gate" class="gate">
        <div class="gate-card">
            <div class="gate-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect x="8" y="20" width="32" height="22" rx="4" stroke="#1d1d1f" stroke-width="2.5" fill="none"/>
                    <path d="M16 20V14a8 8 0 0116 0v6" stroke="#1d1d1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <circle cx="24" cy="32" r="3" fill="#1d1d1f"/>
                </svg>
            </div>
            <h2>艾特米监控平台</h2>
            <p>请输入访问密码</p>
            <input type="password" id="gate-input" placeholder="访问密码" autocomplete="off">
            <button id="gate-btn" onclick="App.checkPassword()">进入</button>
            <p id="gate-error" class="gate-error" style="display:none">密码错误</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app" style="display:none">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>艾特米监控平台</h1>
                <div id="status-badge" class="status-badge">
                    <span class="status-dot"></span>
                    <span id="status-text">加载中...</span>
                </div>
            </div>
            <div class="header-right">
                <span id="last-update" class="last-update">--</span>
                <button class="icon-btn" onclick="App.refreshData()" title="刷新">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <path d="M15.5 9a6.5 6.5 0 11-2.1-4.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <path d="M15.5 2.5v3h-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="icon-btn" onclick="App.openSettings()" title="设置">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.7 3.7l1.4 1.4M12.9 12.9l1.4 1.4M3.7 14.3l1.4-1.4M12.9 5.1l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Session Warning -->
        <div id="session-warning" class="session-warning" style="display:none">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M10 2L1 18h18L10 2z" stroke="#bf8500" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
                <line x1="10" y1="8" x2="10" y2="12" stroke="#bf8500" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="10" cy="15" r="0.8" fill="#bf8500"/>
            </svg>
            <span>Session 已过期，请更新 GitHub Secrets 中的 Cookie。</span>
        </div>

        <!-- Data Error -->
        <div id="data-error" class="session-warning" style="display:none">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="8" stroke="#dc2626" stroke-width="1.5" fill="none"/>
                <line x1="7" y1="7" x2="13" y2="13" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="13" y1="7" x2="7" y2="13" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span id="data-error-text">加载失败</span>
        </div>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab active" data-tab="overview" onclick="App.switchTab('overview')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
                总览
            </button>
            <button class="tab" data-tab="anomalies" onclick="App.switchTab('anomalies')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L1 14h14L8 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><line x1="8" y1="6" x2="8" y2="9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><circle cx="8" cy="12" r="0.7" fill="currentColor"/></svg>
                异常告警
            </button>
            <button class="tab" data-tab="riders" onclick="App.switchTab('riders')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                骑手统计
            </button>
            <button class="tab" data-tab="skipscan" onclick="App.switchTab('skipscan')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/><polyline points="8,4 8,8 11,10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                跳扫码
            </button>
            <button class="tab" data-tab="competitor" onclick="App.switchTab('competitor')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="0.8" stroke="currentColor" stroke-width="1.2"/><rect x="6.5" y="5" width="3" height="9" rx="0.8" stroke="currentColor" stroke-width="1.2"/><rect x="11" y="2" width="3" height="12" rx="0.8" stroke="currentColor" stroke-width="1.2"/></svg>
                竞品监控
            </button>
        </nav>

        <!-- Content Panels -->
        <main class="content">
            <!-- Overview -->
            <section id="panel-overview" class="panel active">
                <div class="metrics-grid" id="metrics-grid"></div>
                <div class="chart-section">
                    <h3>异常分布</h3>
                    <div class="chart-container"><canvas id="chart-trend"></canvas></div>
                </div>
                <div class="table-section">
                    <h3>配送中订单</h3>
                    <div id="delivering-table"></div>
                </div>
            </section>

            <!-- Anomalies -->
            <section id="panel-anomalies" class="panel">
                <div class="panel-header">
                    <h2>异常告警</h2>
                    <div id="anomaly-summary" class="anomaly-summary"></div>
                </div>
                <div id="anomaly-groups"></div>
            </section>

            <!-- Riders -->
            <section id="panel-riders" class="panel">
                <div class="panel-header">
                    <h2>骑手统计</h2>
                    <div class="chart-section" style="margin-bottom:0">
                        <div class="chart-container chart-narrow"><canvas id="chart-riders"></canvas></div>
                    </div>
                </div>
                <div id="rider-groups"></div>
            </section>

            <!-- Skip Scan -->
            <section id="panel-skipscan" class="panel">
                <div class="panel-header">
                    <h2>跳扫码检测</h2>
                    <p class="subtitle">投餐到送达间隔 &lt; 60 秒视为疑似跳扫码</p>
                </div>
                <div id="skip-rider-summary"></div>
                <div id="skip-detail-table"></div>
            </section>

            <!-- Competitor -->
            <section id="panel-competitor" class="panel">
                <div class="panel-header">
                    <h2>竞品监控</h2>
                    <p class="subtitle" id="competitor-date">--</p>
                </div>
                <div class="metrics-grid" id="competitor-metrics"></div>
                <div class="chart-section">
                    <h3>TOP 15 店铺</h3>
                    <div class="chart-container"><canvas id="chart-competitor"></canvas></div>
                </div>
                <div class="table-section">
                    <h3>全部排名</h3>
                    <div id="competitor-table"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display:none">
        <div class="modal-backdrop" onclick="App.closeSettings()"></div>
        <div class="modal-card">
            <h3>设置</h3>
            <div class="setting-row">
                <label>自动刷新间隔</label>
                <select id="setting-interval" onchange="App.updateInterval()">
                    <option value="60">1 分钟</option>
                    <option value="120">2 分钟</option>
                    <option value="300">5 分钟</option>
                    <option value="600">10 分钟</option>
                    <option value="1800" selected>30 分钟</option>
                    <option value="0">关闭</option>
                </select>
            </div>
            <button class="modal-close" onclick="App.closeSettings()">完成</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
