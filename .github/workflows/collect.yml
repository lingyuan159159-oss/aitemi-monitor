name: Collect Aitemi Data

on:
  schedule:
    # 每5分钟运行（公开仓库不限分钟数）
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: collect-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Run collection
        env:
          AITEMI_PHPSESSID: ${{ secrets.AITEMI_PHPSESSID }}
          AITEMI_ADMINSESSION: ${{ secrets.AITEMI_ADMINSESSION }}
          COMPETITOR_SESSION: ${{ secrets.COMPETITOR_SESSION }}
        run: python scripts/collect_all.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/status.json data/history.json
          timestamp=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
          git diff --staged --quiet || git commit -m "data update ${timestamp}"
          git push
